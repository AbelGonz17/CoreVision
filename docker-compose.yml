services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: CoreVision_DB
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=CoreVision1234!
      - MSSQL_PID=Developer
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data: